# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: '3'

vars:
  CLUSTER_NAME: cni-net-lab

tasks:

  # ── Top level ──────────────────────────────────────────────────────────────

  default:
    desc: "List all available tasks"
    cmds:
      - task --list

  install:
    desc: "Install all prerequisites on Ubuntu 22.04/24.04 (requires sudo)"
    cmds:
      - sudo bash scripts/install-prereqs.sh

  check:
    desc: "Verify all prerequisite tools and lab.env / lab.secrets exist"
    cmds:
      - bash scripts/check-prereqs.sh

  up:
    desc: "Full lab up: cluster → CNI → cert-manager → Argo CD → GitOps apps  (start registry first with: task registry:setup)"
    cmds:
      - task: ca:init
      - task: cluster
      - task: cni:install
      - task: pre-deploy
      - task: argocd:install
      - task: argocd:bootstrap
      - task: argocd:wait
      - task: health

  down:
    desc: "Destroy the k3d cluster (registry and CA are preserved)"
    cmds:
      - k3d cluster delete {{.CLUSTER_NAME}}
      - echo "Cluster destroyed. Registry still running. Run 'task up' to rebuild."

  reset:
    desc: "Full teardown and rebuild (preserves registry data and CA)"
    cmds:
      - task: down
      - task: up

  health:
    desc: "Post-deploy verification: nodes, CNI, apps, ports"
    cmds:
      - bash scripts/health-check.sh

  test:
    desc: "Curl smoke tests against all app NodePort endpoints"
    cmds:
      - bash scripts/test-endpoints.sh

  # ── Cluster ────────────────────────────────────────────────────────────────

  cluster:
    desc: "Create the k3d cluster (no LB, no Klipper, no default CNI)"
    cmds:
      - bash scripts/create-cluster.sh

  cluster:only:
    desc: "Cluster + CNI only — no apps, no cert-manager  (start registry first with: task registry:setup)"
    cmds:
      - task: ca:init
      - task: cluster
      - task: cni:install
      - CLUSTER_ONLY=1 bash scripts/health-check.sh

  cluster:reset:
    desc: "Destroy and rebuild cluster + CNI only (no apps)"
    cmds:
      - task: down
      - task: cluster:only

  # ── CNI ────────────────────────────────────────────────────────────────────

  cni:install:
    desc: "Install CNI from lab.env (CNI=calico|cilium)"
    cmds:
      - bash scripts/install-cni.sh

  cni:status:
    desc: "Show CNI pod status and node readiness"
    cmds:
      - bash scripts/cni-status.sh

  cni:hubble:
    desc: "Port-forward Hubble UI to localhost:12000 (Cilium only)"
    cmds:
      - echo "Hubble UI → http://localhost:12000  (Ctrl+C to stop)"
      - kubectl port-forward svc/hubble-ui 12000:80 -n kube-system

  # ── CA & TLS ───────────────────────────────────────────────────────────────

  ca:init:
    desc: "Create local root CA (skips if already exists)"
    cmds:
      - bash scripts/ca-init.sh

  # ── Pre-deploy ─────────────────────────────────────────────────────────────

  pre-deploy:
    desc: "Bootstrap cert-manager, import the local CA, and apply the ClusterIssuer"
    cmds:
      - bash scripts/pre-deploy.sh

  # ── Argo CD (GitOps) ─────────────────────────────────────────────────────────
  # Apps are no longer deployed by scripts — Argo CD reconciles them from git.
  # Edit which apps deploy and how they're exposed in argocd/lab-apps/values.yaml
  # (+ the profile files). task health/test read the live cluster — nothing in
  # lab.env to keep in sync.

  argocd:install:
    desc: "Install Argo CD via Helm (NodePort UI on ARGOCD_HTTP_PORT)"
    cmds:
      - bash scripts/install-argocd.sh

  argocd:bootstrap:
    desc: "Register the root app-of-apps so Argo CD reconciles every workload"
    cmds:
      - bash scripts/argocd-bootstrap.sh

  argocd:wait:
    desc: "Block until all Argo CD Applications are Synced and Healthy"
    cmds:
      - bash scripts/argocd-wait.sh

  argocd:apps:
    desc: "List Argo CD Applications with sync and health status"
    cmds:
      - kubectl get applications -n argocd

  argocd:sync:
    desc: "Force a hard refresh/sync of all Argo CD Applications"
    cmds:
      - kubectl annotate applications --all -n argocd argocd.argoproj.io/refresh=hard --overwrite

  argocd:password:
    desc: "Print the initial Argo CD admin password"
    cmds:
      - kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath='{.data.password}' | base64 -d
      - echo ""

  argocd:ui:
    desc: "Print the Argo CD UI URL (admin / 'task argocd:password')"
    cmds:
      - bash scripts/argocd-url.sh

  # ── crAPI helpers ────────────────────────────────────────────────────────────
  # crAPI is Argo-managed; these are convenience shortcuts into the running app.

  crapi:mail:
    desc: "Port-forward MailHog web UI to localhost:8025"
    cmds:
      - echo "MailHog UI → http://localhost:8025  (Ctrl+C to stop)"
      - kubectl port-forward svc/mailhog 8025:8025 -n crapi

  crapi:logs:
    desc: "Tail crAPI identity service logs"
    cmds:
      - kubectl logs -n crapi deploy/crapi-identity -f

  crapi:chart:update:
    desc: "Fetch the latest OWASP crAPI Helm chart from upstream (defaults to main)"
    cmds:
      - bash scripts/crapi-chart-update.sh

  # ── Registry ───────────────────────────────────────────────────────────────
  # The registry is independent of the cluster lifecycle.
  # Run 'task registry:setup' once. It survives task down/up/reset.

  registry:setup:
    desc: "Start the registry container (run once — survives cluster rebuilds)"
    cmds:
      - bash scripts/registry-setup.sh

  registry:ls:
    desc: "List all images and tags in the registry"
    cmds:
      - bash scripts/registry-ls.sh

  registry:flush:
    desc: "Delete ALL images from the registry (prompts for confirmation)"
    cmds:
      - bash scripts/registry-flush.sh

  registry:cache:
    desc: "Pull all lab images from the internet and push to local registry"
    cmds:
      - bash scripts/registry-cache.sh

  registry:stop:
    desc: "Stop (but don't delete) the registry container"
    cmds:
      - bash scripts/registry-stop.sh

  registry:rm:
    desc: "Remove the registry container AND its data volume (irreversible)"
    cmds:
      - bash scripts/registry-rm.sh

  registry:status:
    desc: "Show registry container state and image count"
    cmds:
      - bash scripts/registry-status.sh

  # ── Gitea (self-hosted Git) ──────────────────────────────────────────────────
  # Optional host container (like the registry, independent of the cluster) to
  # serve as Argo CD's source of truth instead of GitHub. After 'task gitea:setup'
  # set ARGOCD_REPO_URL / ARGOCD_TARGET_REVISION in lab.env and re-bootstrap.

  gitea:setup:
    desc: "Start Gitea, create the lab repo, and push the current branch"
    cmds:
      - bash scripts/gitea-setup.sh

  gitea:push:
    desc: "Push the current branch to Gitea (run after committing changes)"
    cmds:
      - bash scripts/gitea-push.sh

  gitea:status:
    desc: "Show Gitea container state and repo status"
    cmds:
      - bash scripts/gitea-status.sh

  gitea:stop:
    desc: "Stop the Gitea container (preserves data volume)"
    cmds:
      - bash scripts/gitea-stop.sh

  gitea:rm:
    desc: "Remove the Gitea container AND its data volume (irreversible)"
    cmds:
      - bash scripts/gitea-rm.sh

  gitea:ui:
    desc: "Print the Gitea web UI URL"
    cmds:
      - bash scripts/gitea-status.sh
