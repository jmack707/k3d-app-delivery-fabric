{{- if eq .Values.kind "gateway" }}
{{- $root := . -}}
# Gateway API (e.g. NGINX Gateway Fabric) — requires the Gateway API CRDs and a
# GatewayClass/controller. One Gateway + an HTTPRoute per app. The Gateway
# admits routes from all namespaces so each HTTPRoute can live next to its app.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Values.gateway.name }}
  namespace: {{ .Values.gateway.namespace }}
spec:
  gatewayClassName: {{ .Values.gateway.className }}
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
{{- range $name, $app := .Values.apps }}
{{- if $app.enabled }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $name }}
  namespace: {{ $app.namespace }}
spec:
  parentRefs:
    - name: {{ $root.Values.gateway.name }}
      namespace: {{ $root.Values.gateway.namespace }}
  hostnames:
    - {{ $app.host | default (printf "%s.%s" $name $root.Values.labDomain) | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ $app.serviceName }}
          port: {{ $app.servicePort }}
{{- end }}
{{- end }}
{{- end }}
