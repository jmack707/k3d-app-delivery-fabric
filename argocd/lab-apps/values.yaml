# argocd/lab-apps/values.yaml
#
# Source of truth for which workloads Argo CD manages and how they're exposed.
#
# global.* (repoURL, targetRevision, labHostIp, labDomain) are injected by
# scripts/argocd-bootstrap.sh from your git remote and lab.env — the defaults
# below only matter when rendering this chart standalone with `helm template`.
#
# Per-app tls / serviceType / nodePorts ARE the GitOps source of truth. Keep
# tls / serviceType in sync with HTTPS_APPS / CLUSTERIP_APPS in lab.env so the
# verification scripts (task health / task test) report correctly. The
# httpNodePort / httpsNodePort below are the authoritative per-app port
# assignments — keep them within NODEPORT_RANGES in lab.env (default covers
# 30080-30099 and 30440-30459).
global:
  repoURL: https://github.com/jmack707/cni-net-lab.git
  targetRevision: main
  labHostIp: ""
  labDomain: lab.local
  # North-south routing layer (argocd/exposure). none disables it entirely.
  # INGRESS_KIND in lab.env overrides this: none | nginx | cis | gateway.
  ingressKind: none

# Argo CD install namespace and the AppProject these Applications belong to.
argocdNamespace: argocd
project: cni-net-lab

apps:
  crapi:
    enabled: true
    kind: crapi                 # multi-source: vendored upstream chart + $values
    namespace: crapi
    path: apps/crapi/chart
    valuesPath: apps/crapi/values.yaml
    serviceType: NodePort       # NodePort or ClusterIP (crAPI always serves http+https)
    httpNodePort: 30080
    httpsNodePort: 30443

  juiceshop:
    enabled: true
    kind: raw                   # per-app Helm chart in apps/<app>/chart
    namespace: juice-shop
    path: apps/juiceshop/chart
    tls: true
    serviceType: NodePort
    httpNodePort: 30081
    httpsNodePort: 30444

  dvga:
    enabled: true
    kind: raw
    namespace: dvga
    path: apps/dvga/chart
    tls: false
    serviceType: ClusterIP
    httpNodePort: 30082
    httpsNodePort: 30445

  vampi:
    enabled: true
    kind: raw
    namespace: vampi
    path: apps/vampi/chart
    tls: false
    serviceType: ClusterIP
    httpNodePort: 30083
    httpsNodePort: 30446
