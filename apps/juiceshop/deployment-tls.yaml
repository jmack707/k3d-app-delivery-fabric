---
# apps/juiceshop/deployment-tls.yaml
# TLS-terminating variant: same pod runs juice-shop (port 3000) plus an
# nginx sidecar that listens on 8443, terminates TLS using the cert-manager
# Secret 'juice-shop-tls', and proxies cleartext to 127.0.0.1:3000.
#
# The Service exposes both:
#   - HTTP NodePort  (${HTTP_PORT})   → juice-shop container :3000
#   - HTTPS NodePort (${HTTPS_PORT})  → nginx sidecar :8443
#
# Applied only when juiceshop is in HTTPS_APPS (see render-app.sh).

# ── nginx sidecar config ──────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: juice-shop-tls-nginx
  namespace: ${NS}
data:
  nginx.conf: |
    events {}
    http {
      server {
        listen 8443 ssl;
        ssl_certificate     /etc/nginx/tls/tls.crt;
        ssl_certificate_key /etc/nginx/tls/tls.key;
        ssl_protocols TLSv1.2 TLSv1.3;

        location / {
          proxy_pass http://[::1]:3000;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto https;
          # WebSocket support — Juice Shop uses ws for live features
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection "upgrade";
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: juice-shop
  namespace: ${NS}
  labels:
    app: juice-shop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: juice-shop
  template:
    metadata:
      labels:
        app: juice-shop
    spec:
      containers:
        - name: juice-shop
          image: bkimminich/juice-shop:latest
          imagePullPolicy: IfNotPresent
          ports:
            - { containerPort: 3000, name: http }
          resources:
            requests: { memory: "256Mi", cpu: "100m" }
            limits:   { memory: "512Mi", cpu: "500m" }
        - name: tls-sidecar
          image: nginx:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - { containerPort: 8443, name: https }
          volumeMounts:
            - { name: nginx-conf, mountPath: /etc/nginx/nginx.conf, subPath: nginx.conf }
            - { name: tls-cert,   mountPath: /etc/nginx/tls, readOnly: true }
          resources:
            requests: { memory: "32Mi",  cpu: "20m" }
            limits:   { memory: "64Mi",  cpu: "100m" }
      volumes:
        - name: nginx-conf
          configMap:
            name: juice-shop-tls-nginx
        - name: tls-cert
          secret:
            secretName: juice-shop-tls
---
apiVersion: v1
kind: Service
metadata:
  name: juice-shop
  namespace: ${NS}
  labels:
    app: juice-shop
spec:
  type: NodePort
  selector:
    app: juice-shop
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      nodePort: ${HTTP_PORT}
    - name: https
      port: 8443
      targetPort: 8443
      nodePort: ${HTTPS_PORT}
