# apps/crapi/values.yaml
#
# Lab overrides for the vendored OWASP crAPI Helm chart (apps/crapi/chart).
# Consumed by the Argo CD "crapi" Application as a $values valueFile
# (see argocd/lab-apps/templates/applications.yaml).
#
# The chart's crapi-web Service (templates/web/ingress.yaml) is type
# LoadBalancer with explicit nodePort / sslNodePort. With k3s ServiceLB
# disabled, the LoadBalancer stays pending but the NodePorts are still
# allocated, so the app is reachable on LAB_HOST_IP at these ports:
#   - HTTP  → web.service.nodePort
#   - HTTPS → web.service.sslNodePort
#
# These match CRAPI_HTTP_PORT / CRAPI_HTTPS_PORT in lab.env. The Argo
# Application also passes them as Helm parameters, so editing lab.env's
# ports flows through without touching this file.
web:
  service:
    nodePort: 30080
    sslNodePort: 30443

# MailHog's web-ingress Service defaults to LoadBalancer, which never gets an
# external IP in this lab (k3s ServiceLB disabled) and leaves Argo CD stuck
# "Progressing". MailHog is reached via 'task crapi:mail' (port-forward), so
# expose it as ClusterIP instead.
mailhog:
  webService:
    type: ClusterIP
