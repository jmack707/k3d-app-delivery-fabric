---
# apps/vampi/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vampi
  namespace: ${NS}
  labels:
    app: vampi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vampi
  template:
    metadata:
      labels:
        app: vampi
    spec:
      containers:
        - name: vampi
          image: erev0s/vampi:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: vampi
  namespace: ${NS}
  labels:
    app: vampi
spec:
  type: NodePort
  selector:
    app: vampi
  ports:
    - name: http
      port: 5000
      targetPort: 5000
      nodePort: ${HTTP_PORT}
