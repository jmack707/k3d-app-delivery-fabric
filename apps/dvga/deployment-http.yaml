---
# apps/dvga/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dvga
  namespace: ${NS}
  labels:
    app: dvga
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dvga
  template:
    metadata:
      labels:
        app: dvga
    spec:
      containers:
        - name: dvga
          image: dolevf/dvga:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5013
          env:
            - name: WEB_HOST
              value: "0.0.0.0"
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: dvga
  namespace: ${NS}
  labels:
    app: dvga
spec:
  type: NodePort
  selector:
    app: dvga
  ports:
    - name: http
      port: 5013
      targetPort: 5013
      nodePort: ${HTTP_PORT}
