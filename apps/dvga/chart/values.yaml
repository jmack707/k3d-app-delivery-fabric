# apps/dvga/chart/values.yaml
#
# Defaults let `helm template apps/dvga/chart` render standalone.
# At deploy time, Argo CD overrides service.type / nodePorts / tls.enabled /
# labHostIp / labDomain / host from argocd/lab-apps (see that chart's values).
name: dvga
image: dolevf/dvga:latest
imagePullPolicy: IfNotPresent
containerPort: 5013
replicas: 1

service:
  type: ClusterIP
  httpNodePort: 30082
  httpsNodePort: 30445

tls:
  enabled: false

certIssuer:
  name: local-ca
  kind: ClusterIssuer

labHostIp: ""
labDomain: lab.local
host: ""

env:
  - name: WEB_HOST
    value: "0.0.0.0"

resources:
  requests:
    memory: "128Mi"
    cpu: "50m"
  limits:
    memory: "256Mi"
    cpu: "250m"

tlsSidecar:
  image: nginx:1.27-alpine
  resources:
    requests:
      memory: "32Mi"
      cpu: "20m"
    limits:
      memory: "64Mi"
      cpu: "100m"
