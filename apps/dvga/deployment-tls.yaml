---
# apps/dvga/deployment-tls.yaml
# TLS-terminating variant for DVGA. Same pattern as juice-shop.
# Applied only when dvga is in HTTPS_APPS.

apiVersion: v1
kind: ConfigMap
metadata:
  name: dvga-tls-nginx
  namespace: ${NS}
data:
  nginx.conf: |
    events {}
    http {
      server {
        listen 8443 ssl;
        ssl_certificate     /etc/nginx/tls/tls.crt;
        ssl_certificate_key /etc/nginx/tls/tls.key;
        ssl_protocols TLSv1.2 TLSv1.3;

        location / {
          proxy_pass http://[::1]:5013;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto https;
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dvga
  namespace: ${NS}
  labels:
    app: dvga
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dvga
  template:
    metadata:
      labels:
        app: dvga
    spec:
      containers:
        - name: dvga
          image: dolevf/dvga:latest
          imagePullPolicy: IfNotPresent
          ports:
            - { containerPort: 5013, name: http }
          env:
            - { name: WEB_HOST, value: "0.0.0.0" }
          resources:
            requests: { memory: "128Mi", cpu: "50m" }
            limits:   { memory: "256Mi", cpu: "250m" }
        - name: tls-sidecar
          image: nginx:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - { containerPort: 8443, name: https }
          volumeMounts:
            - { name: nginx-conf, mountPath: /etc/nginx/nginx.conf, subPath: nginx.conf }
            - { name: tls-cert,   mountPath: /etc/nginx/tls, readOnly: true }
          resources:
            requests: { memory: "32Mi", cpu: "20m" }
            limits:   { memory: "64Mi", cpu: "100m" }
      volumes:
        - name: nginx-conf
          configMap:
            name: dvga-tls-nginx
        - name: tls-cert
          secret:
            secretName: dvga-tls
---
apiVersion: v1
kind: Service
metadata:
  name: dvga
  namespace: ${NS}
  labels:
    app: dvga
spec:
  type: NodePort
  selector:
    app: dvga
  ports:
    - name: http
      port: 5013
      targetPort: 5013
      nodePort: ${HTTP_PORT}
    - name: https
      port: 8443
      targetPort: 8443
      nodePort: ${HTTPS_PORT}
