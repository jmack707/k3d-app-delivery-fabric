---
# apps/dvga/certificate-tls.yaml
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: dvga-tls
  namespace: ${NS}
spec:
  secretName: dvga-tls
  issuerRef:
    name: local-ca
    kind: ClusterIssuer
  dnsNames:
    - ${DVGA_HOST}
    - dvga.${LAB_DOMAIN}
  ipAddresses:
    - ${LAB_HOST_IP}
